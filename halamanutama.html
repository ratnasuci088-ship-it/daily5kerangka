<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyAbout5Kerangka - Update Kegiatan Harian Kalian</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f3f4f6;
}

header{
    background:linear-gradient(135deg,#7c3aed,#4f46e5);
    color:white;
    padding:20px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.container{
    width:90%;
    max-width:700px;
    margin:20px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

textarea{
    width:100%;
    height:100px;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    resize:none;
}

input[type=file]{
    margin-top:10px;
}

button{
    background:#7c3aed;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#6d28d9;
}

.post{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.post img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.info{
    color:gray;
    font-size:13px;
    margin-top:5px;
}

.actions{
    margin-top:10px;
}

.actions button{
    margin-right:10px;
}

h2{
    color:#4f46e5;
    margin-bottom:10px;
}
</style>
</head>
<body>

<header>
    <h1>📱 DailyAbout5Kerangka</h1>
    <p>Bagikan aktivitas harianmu disini sekarang</p>
</header>

<div class="container">

    <div class="card">
        <h2>Buat Postingan</h2>

        <textarea id="caption" placeholder="Apa kegiatanmu hari ini?"></textarea>

        <input type="file" id="foto" accept="image/*">

        <br>

        <button onclick="buatPostingan()">Posting</button>
    </div>

    <div id="feed"></div>

</div>

<script type="module">

window.buatPostingan = async function(){

    const caption =
    document.getElementById("caption").value;

    const file =
    document.getElementById("foto").files[0];

    if(caption.trim() === ""){
        alert("Tulis kegiatan terlebih dahulu!");
        return;
    }

    const username =
    localStorage.getItem("username") || "Pengguna";

    let fotoUrl = "";

    if(file){

        const formData = new FormData();

        formData.append("file", file);

        formData.append(
            "upload_preset",
            "dailyabout5"
        );

        const response = await fetch(
            "https://api.cloudinary.com/v1_1/dowyyyfcz/image/upload",
            {
                method:"POST",
                body:formData
            }
        );

        const data =
        await response.json();

        fotoUrl =
        data.secure_url;
    }

    await addDoc(
        collection(db,"postingan"),
        {
            username: username,
            caption: caption,
            fotoUrl: fotoUrl,
            tanggal: new Date().toLocaleString()
        }
    );

    document.getElementById("caption").value="";
    document.getElementById("foto").value="";

    tampilkanPostingan();
}
</script>

</body>
</html>
